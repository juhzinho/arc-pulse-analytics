global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: arc-pulse-api
    metrics_path: /v1/observability/metrics
    static_configs:
      - targets:
          - host.docker.internal:4000

  - job_name: arc-pulse-indexer
    metrics_path: /
    static_configs:
      - targets:
          - host.docker.internal:9100
